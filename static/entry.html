<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1f3c">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MedJournee">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon.ico">
    <title>MedJournee - Journal Entry</title>
    <link rel="stylesheet" href="/static/css/neuglass.css">
    <style>
        /* Entry page-specific styles */

        .entry-content {
            padding: 15px;
        }

        /* Date Badge */
        .date-badge {
            background: linear-gradient(135deg, rgba(255, 140, 66, 0.2), rgba(255, 107, 107, 0.2));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 20px;
            border-radius: var(--radius-lg);
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 140, 66, 0.2);
            box-shadow: 0 8px 32px rgba(255, 140, 66, 0.15);
        }

        .date-day {
            font-size: 48px;
            font-weight: bold;
        }

        .date-month {
            font-size: 18px;
            opacity: 0.9;
        }

        /* Section overrides */
        .section {
            background: var(--glass-medium);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section:hover {
            background: rgba(255, 255, 255, 0.16);
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--sunset-peach);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-content {
            color: var(--text-primary);
            line-height: 1.6;
        }

        .section-content.editable {
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 8px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .edit-mode .section-content.editable {
            border-color: var(--sunset-orange);
            background: var(--glass-dark);
        }

        .section-content[contenteditable="true"]:focus {
            outline: none;
            border-color: var(--sunset-peach);
        }

        /* Info Rows */
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .info-value {
            font-weight: 500;
            color: var(--text-primary);
        }

        /* List Items */
        .list-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-bullet {
            color: var(--sunset-peach);
            font-weight: bold;
        }

        /* Medication Cards */
        .medication-card {
            background: rgba(74, 144, 226, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(74, 144, 226, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .medication-card:hover {
            background: rgba(74, 144, 226, 0.18);
            transform: translateY(-1px);
        }

        .medication-name {
            font-weight: 600;
            color: var(--sunset-sky);
            margin-bottom: 4px;
        }

        .medication-details {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Family Summary */
        .family-summary {
            background: rgba(76, 175, 80, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(76, 175, 80, 0.15);
        }

        .family-summary .section-title {
            color: #81c784;
        }

        /* Notes Section */
        .notes-section textarea {
            width: 100%;
            min-height: 100px;
            background: var(--glass-dark);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text-primary);
            resize: vertical;
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.25),
                        inset -2px -2px 4px rgba(255, 255, 255, 0.03);
        }

        .notes-section textarea:focus {
            outline: none;
            border-color: rgba(255, 140, 66, 0.5);
        }

        .notes-section textarea::placeholder {
            color: var(--text-muted);
        }

        /* Medical Terms */
        .medical-term {
            background: linear-gradient(120deg, rgba(255, 140, 66, 0.2), rgba(255, 140, 66, 0.1));
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            border-bottom: 2px dotted var(--sunset-orange);
        }

        .term-explanation {
            background: var(--glass-medium);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 140, 66, 0.15);
            border-radius: var(--radius-sm);
            padding: 15px;
            margin: 10px 0;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .term-explanation:hover {
            background: rgba(255, 255, 255, 0.16);
            box-shadow: 0 4px 16px rgba(255, 140, 66, 0.1);
        }

        .term-simple {
            font-weight: 600;
            color: var(--sunset-orange);
            margin-bottom: 5px;
        }

        /* Edit Button */
        .edit-btn {
            background: var(--glass-light);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            padding: 8px 15px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Action Bar */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 428px;
            margin: 0 auto;
            background: var(--glass-medium);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            padding: 15px;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.25);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 10px;
        }

        .action-bar button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-bar button:hover {
            transform: translateY(-1px);
        }

        .action-bar button:active {
            transform: scale(0.97);
        }

        .btn-share {
            background: rgba(74, 144, 226, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--sunset-sky);
            border: 1px solid rgba(74, 144, 226, 0.2);
        }

        .btn-delete {
            background: rgba(255, 82, 82, 0.15);
            color: var(--sunset-coral);
            border: 1px solid rgba(255, 82, 82, 0.2);
        }

        .content-wrapper {
            padding-bottom: 80px;
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        /* Raw Transcript */
        .raw-transcript {
            background: var(--glass-dark);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 12px;
        }

        .raw-transcript .section-title {
            color: var(--text-muted);
        }

        .transcript-line {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .transcript-line:last-child {
            border-bottom: none;
        }

        .transcript-speaker {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .transcript-speaker.provider {
            color: var(--sunset-blue);
        }

        .transcript-speaker.family {
            color: #81c784;
        }

        .transcript-text {
            color: var(--text-primary);
            line-height: 1.5;
        }

        .transcript-translation {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 4px;
            padding-left: 15px;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
        }

        .raw-mode-badge {
            display: inline-block;
            background: var(--sunset-orange);
            color: white;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 12px;
            margin-left: 10px;
        }

        .toggle-transcript {
            background: rgba(74, 144, 226, 0.1);
            border: 1px solid rgba(74, 144, 226, 0.15);
            color: var(--sunset-sky);
            padding: 10px 15px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-transcript:hover {
            background: rgba(74, 144, 226, 0.18);
        }

        .transcript-content {
            display: none;
            margin-top: 10px;
            animation: fadeIn 0.4s ease;
        }

        .transcript-content.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Talking Points Section (entry-specific) */
        .talking-points-section {
            background: rgba(255, 140, 66, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 140, 66, 0.15);
        }

        .talking-points-section .section-title {
            color: var(--sunset-orange);
        }

        .talking-point-text.unchecked {
            font-weight: 500;
        }

        .talking-point-unchecked-badge {
            display: inline-block;
            background: var(--sunset-orange);
            color: white;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 11px;
            margin-left: 8px;
        }

        /* Appointment Link Section */
        .appointment-link-section {
            background: rgba(179, 136, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-md);
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(179, 136, 255, 0.15);
        }

        .appointment-link-section .section-title {
            color: var(--color-purple);
        }

        .linked-appointment {
            background: var(--glass-light);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-top: 10px;
        }

        .linked-appointment-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .linked-appointment-date {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .linked-appointment-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .link-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-btn.primary {
            background: linear-gradient(135deg, #b388ff, #7c4dff);
            color: white;
        }

        .link-btn.secondary {
            background: var(--glass-light);
            color: var(--text-secondary);
        }

        .link-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .suggested-appointments {
            margin-top: 10px;
        }

        .suggested-appointment {
            background: var(--glass-light);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .suggested-appointment:hover {
            border-color: rgba(179, 136, 255, 0.3);
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(179, 136, 255, 0.1);
        }

        .suggested-appointment-date {
            font-size: 12px;
            color: var(--color-purple);
            font-weight: 500;
        }

        .suggested-appointment-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 2px;
        }

        .suggested-appointment-provider {
            font-size: 13px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">Journal Entry</div>
        <button class="edit-btn" id="editBtn" onclick="toggleEditMode()">Edit</button>
    </div>

    <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p>Loading journal entry...</p>
    </div>

    <div id="errorState" class="error-state" style="display: none;">
        <div style="font-size: 48px; margin-bottom: 20px;">📋</div>
        <h3>Entry Not Found</h3>
        <p style="margin-top: 10px;">This journal entry could not be loaded.</p>
        <button onclick="goBack()" style="margin-top: 20px; padding: 12px 24px; background: #2196F3; color: white; border: none; border-radius: 8px; cursor: pointer;">Go Back</button>
    </div>

    <div id="entryContent" class="content-wrapper" style="display: none;">
        <!-- Content will be dynamically inserted -->
    </div>

    <div class="action-bar" id="actionBar" style="display: none;">
        <button class="btn-save" onclick="saveAllChanges()" style="
            background: rgba(76,175,80,0.2); border: 1px solid rgba(76,175,80,0.4);
            color: #81c784; padding: 8px 18px; border-radius: 20px;
            font-size: 14px; font-weight: 600; cursor: pointer;">&#128190; Save</button>
        <button class="btn-share" onclick="shareEntry()">📤 Share</button>
        <button class="btn-delete" onclick="deleteEntry()">🗑️ Delete</button>
    </div>

    <div class="save-indicator" id="saveIndicator">✓ Saved</div>

    <script src="/static/js/config.js"></script>
    <script>
        let sessionId = null;
        let entryData = null;
        let isEditMode = false;
        let autoSaveTimeout = null;
        let linkedAppointment = null;
        let talkingPoints = [];

        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        sessionId = urlParams.get('session');

        if (!sessionId) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
        } else {
            loadEntry();
        }

        function goBack() {
            window.location.href = '/';
        }

        async function loadEntry() {
            try {
                console.log('Loading journal for session:', sessionId);
                const response = await fetch(`${API_BASE}/live-session/get-journal/${sessionId}`);
                const result = await response.json();
                console.log('Journal API response:', result);

                document.getElementById('loadingState').style.display = 'none';

                if (result.success && result.journal_entry) {
                    entryData = result.journal_entry;
                    console.log('Entry data loaded:', entryData);
                    renderEntry(entryData);
                    document.getElementById('entryContent').style.display = 'block';
                    document.getElementById('actionBar').style.display = 'flex';

                    // Load linked appointment and talking points
                    await loadLinkedAppointment();
                    await loadTalkingPoints();
                } else {
                    console.error('Journal not found:', result.error || 'Unknown error');
                    // Show the actual error message
                    const errorEl = document.getElementById('errorState');
                    errorEl.innerHTML = `
                        <div style="font-size: 48px; margin-bottom: 20px;">📋</div>
                        <h3>Entry Not Found</h3>
                        <p style="margin-top: 10px;">Session: ${sessionId}</p>
                        <p style="margin-top: 5px; color: #999; font-size: 12px;">${result.error || 'The journal entry could not be loaded.'}</p>
                        <button onclick="goBack()" style="margin-top: 20px; padding: 12px 24px; background: #2196F3; color: white; border: none; border-radius: 8px; cursor: pointer;">Go Back</button>
                        <button onclick="loadEntry()" style="margin-top: 10px; padding: 12px 24px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px;">Retry</button>
                    `;
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('loadingState').style.display = 'none';
                const errorEl = document.getElementById('errorState');
                errorEl.innerHTML = `
                    <div style="font-size: 48px; margin-bottom: 20px;">⚠️</div>
                    <h3>Connection Error</h3>
                    <p style="margin-top: 10px;">${error.message}</p>
                    <button onclick="goBack()" style="margin-top: 20px; padding: 12px 24px; background: #2196F3; color: white; border: none; border-radius: 8px; cursor: pointer;">Go Back</button>
                    <button onclick="loadEntry()" style="margin-top: 10px; padding: 12px 24px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px;">Retry</button>
                `;
                errorEl.style.display = 'block';
            }
        }

        async function loadLinkedAppointment() {
            if (!entryData || !entryData.entry_id) return;

            try {
                // Check if any appointment is linked to this entry
                const response = await fetch(`${API_BASE}/appointments/list/user-001?limit=100`);
                const result = await response.json();

                if (result.success && result.appointments) {
                    linkedAppointment = result.appointments.find(a => a.linked_entry_id === entryData.entry_id);

                    if (linkedAppointment) {
                        renderLinkedAppointment();
                    } else {
                        // Check for suggested appointments (same date)
                        await loadSuggestedAppointments();
                    }
                }
            } catch (error) {
                console.error('Failed to load linked appointment:', error);
            }
        }

        async function loadSuggestedAppointments() {
            if (!entryData || !entryData.visit_date) return;

            try {
                const response = await fetch(`${API_BASE}/appointments/date/user-001/${entryData.visit_date}`);
                const result = await response.json();

                if (result.success && result.appointments && result.appointments.length > 0) {
                    // Filter out already completed/linked appointments
                    const unlinked = result.appointments.filter(a => !a.linked_entry_id && a.status === 'scheduled');
                    if (unlinked.length > 0) {
                        renderSuggestedAppointments(unlinked);
                    }
                }
            } catch (error) {
                console.error('Failed to load suggested appointments:', error);
            }
        }

        async function loadTalkingPoints() {
            if (!entryData || !entryData.entry_id) return;

            try {
                const response = await fetch(`${API_BASE}/talking-points/entry/${entryData.entry_id}`);
                const result = await response.json();

                if (result.success && result.talking_points && result.talking_points.length > 0) {
                    talkingPoints = result.talking_points;
                    renderTalkingPoints();
                }
            } catch (error) {
                console.error('Failed to load talking points:', error);
            }
        }

        function renderLinkedAppointment() {
            const container = document.getElementById('appointmentLinkContainer');
            if (!container || !linkedAppointment) return;

            const date = new Date(linkedAppointment.scheduled_date + 'T00:00:00');
            const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

            container.innerHTML = `
                <div class="section-title">&#128279; Linked Appointment</div>
                <div class="linked-appointment">
                    <div class="linked-appointment-title">${linkedAppointment.title}</div>
                    <div class="linked-appointment-date">${dateStr}${linkedAppointment.provider_name ? ' - ' + linkedAppointment.provider_name : ''}</div>
                    <div class="linked-appointment-actions">
                        <button class="link-btn primary" onclick="viewAppointment('${linkedAppointment.id}')">View Appointment</button>
                        <button class="link-btn secondary" onclick="unlinkAppointment('${linkedAppointment.id}')">Unlink</button>
                    </div>
                </div>
            `;
            container.style.display = 'block';
        }

        function renderSuggestedAppointments(appointments) {
            const container = document.getElementById('appointmentLinkContainer');
            if (!container) return;

            let html = `
                <div class="section-title">&#128279; Link to Appointment</div>
                <p style="font-size: 13px; color: #666; margin-bottom: 10px;">
                    We found appointment(s) on this date. Would you like to link this journal entry?
                </p>
                <div class="suggested-appointments">
            `;

            appointments.forEach(appt => {
                const date = new Date(appt.scheduled_date + 'T00:00:00');
                const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

                html += `
                    <div class="suggested-appointment" onclick="linkAppointment('${appt.id}')">
                        <div class="suggested-appointment-date">${dateStr}${appt.scheduled_time ? ' at ' + formatTime(appt.scheduled_time) : ''}</div>
                        <div class="suggested-appointment-title">${appt.title}</div>
                        ${appt.provider_name ? `<div class="suggested-appointment-provider">${appt.provider_name}</div>` : ''}
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
            container.style.display = 'block';
        }

        function renderTalkingPoints() {
            const container = document.getElementById('talkingPointsContainer');
            if (!container || talkingPoints.length === 0) return;

            const uncheckedCount = talkingPoints.filter(p => !p.done).length;

            let html = `
                <div class="section-title">
                    &#9989; Talking Points
                    ${uncheckedCount > 0 ? `<span class="talking-point-unchecked-badge">${uncheckedCount} not discussed</span>` : ''}
                </div>
                <div class="section-content">
            `;

            talkingPoints.forEach(point => {
                html += `
                    <div class="talking-point-item">
                        <div class="talking-point-checkbox ${point.done ? 'checked' : ''}" onclick="toggleTalkingPoint('${point.id}')"></div>
                        <div class="talking-point-content">
                            <div class="talking-point-text ${point.done ? 'done' : 'unchecked'}">${escapeHtml(point.text)}</div>
                            <div class="talking-point-meta">
                                ${point.category !== 'general' ? `<span class="talking-point-badge ${point.category}">${point.category}</span>` : ''}
                                ${point.priority === 'high' ? `<span class="talking-point-badge high">High Priority</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
            container.style.display = 'block';
        }

        function formatTime(timeStr) {
            if (!timeStr) return '';
            const [hours, minutes] = timeStr.split(':');
            const h = parseInt(hours);
            const ampm = h >= 12 ? 'PM' : 'AM';
            const hour12 = h % 12 || 12;
            return `${hour12}:${minutes} ${ampm}`;
        }

        async function linkAppointment(appointmentId) {
            try {
                const response = await fetch(`${API_BASE}/appointments/${appointmentId}/link/${entryData.entry_id}`, {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.success) {
                    linkedAppointment = result.appointment;
                    renderLinkedAppointment();
                    // Reload talking points
                    await loadTalkingPoints();
                }
            } catch (error) {
                console.error('Failed to link appointment:', error);
                alert('Failed to link appointment');
            }
        }

        async function unlinkAppointment(appointmentId) {
            if (!confirm('Unlink this appointment from the journal entry?')) return;

            try {
                const response = await fetch(`${API_BASE}/appointments/${appointmentId}/unlink`, {
                    method: 'POST'
                });
                const result = await response.json();

                if (result.success) {
                    linkedAppointment = null;
                    talkingPoints = [];
                    document.getElementById('appointmentLinkContainer').style.display = 'none';
                    document.getElementById('talkingPointsContainer').style.display = 'none';
                    // Check for suggested appointments again
                    await loadSuggestedAppointments();
                }
            } catch (error) {
                console.error('Failed to unlink appointment:', error);
                alert('Failed to unlink appointment');
            }
        }

        function viewAppointment(appointmentId) {
            window.location.href = `/static/appointment.html?id=${appointmentId}`;
        }

        async function toggleTalkingPoint(pointId) {
            try {
                const response = await fetch(`${API_BASE}/talking-points/${pointId}/toggle`, {
                    method: 'PUT'
                });
                const result = await response.json();

                if (result.success) {
                    const point = talkingPoints.find(p => p.id === pointId);
                    if (point) {
                        point.done = result.done;
                        renderTalkingPoints();
                    }
                }
            } catch (error) {
                console.error('Failed to toggle talking point:', error);
            }
        }

        function renderEntry(entry) {
            const date = new Date(entry.visit_date);
            const day = date.getDate();
            const month = date.toLocaleString('en', { month: 'long', year: 'numeric' });

            let html = `
                <div class="entry-content">
                    <div class="date-badge">
                        <div class="date-day">${day}</div>
                        <div class="date-month">${month}</div>
                    </div>

                    <div class="section">
                        <div class="section-title">📋 Visit Information</div>
                        <div class="section-content">
                            <div class="info-row">
                                <span class="info-label">Visit Type</span>
                                <span class="info-value" data-field="visit_type">${entry.visit_type || 'Medical Visit'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Provider</span>
                                <span class="info-value" data-field="provider_name">${entry.provider_name || 'Healthcare Provider'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Patient</span>
                                <span class="info-value" data-field="patient_name">${entry.patient_name || 'Patient'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Main Reason</span>
                                <span class="info-value" data-field="main_reason">${entry.main_reason || 'Medical consultation'}</span>
                            </div>
                        </div>
                    </div>
            `;

            // Symptoms
            if (entry.symptoms && entry.symptoms.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">🤒 Symptoms Discussed</div>
                        <div class="section-content" data-field="symptoms">
                            ${formatList(entry.symptoms)}
                        </div>
                    </div>
                `;
            }

            // Diagnoses
            if (entry.diagnoses && entry.diagnoses.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">🔍 Diagnoses</div>
                        <div class="section-content" data-field="diagnoses">
                            ${formatList(entry.diagnoses)}
                        </div>
                    </div>
                `;
            }

            // Treatments
            if (entry.treatments && entry.treatments.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">💊 Treatments</div>
                        <div class="section-content" data-field="treatments">
                            ${formatList(entry.treatments)}
                        </div>
                    </div>
                `;
            }

            // Medications
            if (entry.medications && entry.medications.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">💊 Medications</div>
                        <div class="section-content">
                            ${formatMedications(entry.medications)}
                        </div>
                    </div>
                `;
            }

            // Follow-up Instructions
            if (entry.follow_up_instructions && entry.follow_up_instructions.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">📝 Follow-up Instructions</div>
                        <div class="section-content" data-field="follow_up_instructions">
                            ${formatList(entry.follow_up_instructions)}
                        </div>
                    </div>
                `;
            }

            // Family Summary
            if (entry.family_summary) {
                html += `
                    <div class="family-summary">
                        <div class="section-title">👨‍👩‍👧 Family Summary</div>
                        <div class="section-content editable" data-field="family_summary">
                            ${entry.family_summary}
                        </div>
                    </div>
                `;
            }

            // Medical Terms Explained
            if (entry.medical_terms_explained && Object.keys(entry.medical_terms_explained).length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">📖 Medical Terms Explained</div>
                        <div class="section-content">
                            ${formatMedicalTerms(entry.medical_terms_explained)}
                        </div>
                    </div>
                `;
            }

            // Raw Transcript (if available)
            if (entry.raw_transcript) {
                const isRawOnly = entry.processing_method === 'raw_transcript_only';
                html += `
                    <div class="raw-transcript">
                        <div class="section-title">
                            📝 Conversation Transcript
                            ${isRawOnly ? '<span class="raw-mode-badge">Raw Mode</span>' : ''}
                        </div>
                        <button class="toggle-transcript" onclick="toggleTranscript()">
                            Show Full Transcript
                        </button>
                        <div class="transcript-content" id="transcriptContent">
                            ${formatRawTranscript(entry.raw_transcript)}
                        </div>
                    </div>
                `;
            }

            // Linked Appointment Section (will be populated dynamically)
            html += `
                <div class="appointment-link-section" id="appointmentLinkContainer" style="display: none;">
                    <!-- Appointment link content will be rendered here -->
                </div>
            `;

            // Talking Points Section (will be populated dynamically)
            html += `
                <div class="talking-points-section" id="talkingPointsContainer" style="display: none;">
                    <!-- Talking points will be rendered here -->
                </div>
            `;

            // Personal Notes
            html += `
                <div class="section notes-section">
                    <div class="section-title">&#9999; Personal Notes</div>
                    <textarea id="personalNotes" placeholder="Add your own notes here..." oninput="autoSaveNotes()">${entry.personal_notes || ''}</textarea>
                </div>
            `;

            html += `</div>`;

            document.getElementById('entryContent').innerHTML = html;
        }

        function formatList(items) {
            if (!items || items.length === 0) return '<p>None recorded</p>';

            if (typeof items === 'string') {
                items = items.split('\n').filter(i => i.trim());
            }

            return items.map(item => `
                <div class="list-item">
                    <span class="list-bullet">•</span>
                    <span>${item}</span>
                </div>
            `).join('');
        }

        function formatRawTranscript(rawTranscript) {
            if (!rawTranscript) return '<p>No transcript available</p>';

            // Split by double newlines (each segment)
            const segments = rawTranscript.split('\n\n').filter(s => s.trim());

            return segments.map(segment => {
                const lines = segment.split('\n');
                const mainLine = lines[0] || '';
                const translation = lines[1] || '';

                // Parse speaker and text
                const colonIndex = mainLine.indexOf(':');
                let speaker = 'Unknown';
                let text = mainLine;

                if (colonIndex > 0) {
                    speaker = mainLine.substring(0, colonIndex).trim();
                    text = mainLine.substring(colonIndex + 1).trim();
                }

                // Format "SPEAKER_1" → "Speaker 1" for display
                if (/^SPEAKER_\d+$/.test(speaker)) {
                    speaker = 'Speaker ' + speaker.replace('SPEAKER_', '');
                }

                // Enrolled speakers (named people) get green highlight; generic speakers get blue
                const isGenericSpeaker = speaker.startsWith('Speaker ');
                const speakerClass = isGenericSpeaker ? 'provider' : 'patient';

                let html = `
                    <div class="transcript-line">
                        <div class="transcript-speaker ${speakerClass}">${escapeHtml(speaker)}</div>
                        <div class="transcript-text">${escapeHtml(text)}</div>
                `;

                // Add translation if present
                if (translation && translation.trim().startsWith('→')) {
                    const translatedText = translation.replace('→', '').trim();
                    html += `<div class="transcript-translation">${escapeHtml(translatedText)}</div>`;
                }

                html += '</div>';
                return html;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleTranscript() {
            const content = document.getElementById('transcriptContent');
            const btn = document.querySelector('.toggle-transcript');

            if (content.classList.contains('show')) {
                content.classList.remove('show');
                btn.textContent = 'Show Full Transcript';
            } else {
                content.classList.add('show');
                btn.textContent = 'Hide Transcript';
            }
        }

        function formatMedications(meds) {
            if (!meds || meds.length === 0) return '<p>None prescribed</p>';

            return meds.map(med => {
                if (typeof med === 'string') {
                    return `<div class="medication-card"><div class="medication-name">${med}</div></div>`;
                }
                return `
                    <div class="medication-card">
                        <div class="medication-name">${med.name || 'Medication'}</div>
                        <div class="medication-details">
                            ${med.dosage ? `Dosage: ${med.dosage}` : ''}
                            ${med.frequency ? ` | ${med.frequency}` : ''}
                            ${med.duration ? ` | ${med.duration}` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatMedicalTerms(terms) {
            return Object.entries(terms).map(([term, explanation]) => {
                const simple = typeof explanation === 'object' ? explanation.simple : explanation;
                const detail = typeof explanation === 'object' ? explanation.explanation : '';
                return `
                    <div class="term-explanation">
                        <div style="font-weight: 600; color: #333;">${term}</div>
                        <div class="term-simple">= ${simple}</div>
                        ${detail ? `<div style="color: #666; font-size: 13px; margin-top: 5px;">${detail}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const editBtn = document.getElementById('editBtn');
            const editableFields = document.querySelectorAll('.editable');

            if (isEditMode) {
                editBtn.textContent = 'Done';
                editBtn.style.background = '#4CAF50';
                document.body.classList.add('edit-mode');
                editableFields.forEach(field => {
                    field.contentEditable = 'true';
                });
            } else {
                editBtn.textContent = 'Edit';
                editBtn.style.background = 'rgba(255,255,255,0.2)';
                document.body.classList.remove('edit-mode');
                editableFields.forEach(field => {
                    field.contentEditable = 'false';
                });
                saveAllChanges();
            }
        }

        function autoSaveNotes() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(async () => {
                const notes = document.getElementById('personalNotes').value;
                try {
                    const response = await fetch(`${API_BASE}/live-session/update-journal-notes/${sessionId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ personal_notes: notes })
                    });
                    const result = await response.json();
                    if (result.success) {
                        showSaveIndicator();
                    } else {
                        console.error('Notes save failed:', result.error);
                        showSaveIndicator('error');
                    }
                } catch (error) {
                    console.error('Auto-save error:', error);
                    showSaveIndicator('error');
                }
            }, 2000);
        }

        async function saveAllChanges() {
            const updates = {};

            // Collect editable field values
            document.querySelectorAll('[data-field]').forEach(el => {
                const field = el.dataset.field;
                updates[field] = el.textContent.trim();
            });

            try {
                await fetch(`${API_BASE}/live-session/update-journal/${sessionId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                showSaveIndicator();
            } catch (error) {
                console.error('Save error:', error);
            }
        }

        function showSaveIndicator(state = 'ok') {
            const indicator = document.getElementById('saveIndicator');
            if (state === 'error') {
                indicator.textContent = '✕ Save failed';
                indicator.style.background = 'rgba(229,57,53,0.8)';
            } else {
                indicator.textContent = '✓ Saved';
                indicator.style.background = 'rgba(76,175,80,0.8)';
            }
            indicator.classList.add('show');
            setTimeout(() => indicator.classList.remove('show'), 2500);
        }

        function shareEntry() {
            if (navigator.share) {
                navigator.share({
                    title: `Medical Visit - ${entryData.visit_date}`,
                    text: entryData.family_summary || 'Medical visit journal entry'
                });
            } else {
                // Fallback: copy to clipboard
                const summary = entryData.family_summary || entryData.visit_summary || 'Medical visit';
                navigator.clipboard.writeText(summary);
                alert('Summary copied to clipboard!');
            }
        }

        async function deleteEntry() {
            if (!confirm('Delete this journal entry? This cannot be undone.')) return;
            try {
                const res = await fetch(`${API_BASE}/live-session/delete-journal/${sessionId}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    window.location.href = '/static/mobile.html';
                } else {
                    alert('Failed to delete entry.');
                }
            } catch (e) {
                alert('Network error.');
            }
        }
    </script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
    </script>
</body>
</html>
